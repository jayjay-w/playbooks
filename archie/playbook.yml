---
- name: Automate Ubuntu Desktop Setup
  hosts: archie
  become: yes
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes

    - name: Install essential packages
      ansible.builtin.apt:
        name:
          - git
          - tmux
          - zsh
          - build-essential
          - htop
          - vlc
          - gparted
          # Dev tools
          - cmake
          - pkg-config
          - libssl-dev
          - python3
          - python3-pip
          - python3-venv
          - default-jdk
          - jq
          - httpie
          - shellcheck
          - strace
          - net-tools
          - openssh-server
          - wget
          - unzip
          # Productivity & utilities
          - flameshot
          - peek
          - copyq
          - redshift
          - keepassxc
          - thunderbird
          - libreoffice
          - filezilla
          - remmina
          - timeshift
          - tree
          - ripgrep
          - fd-find
          - fzf
          - bat
          - ncdu
          - tldr
          - neovim
          - dconf-editor
          - gnome-tweaks
        state: present

    - name: Install Google Chrome
      ansible.builtin.get_url:
        url: https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
        dest: /tmp/google-chrome-stable_current_amd64.deb
      # Install using a separate task for clarity
    - name: Install Google Chrome from downloaded .deb file
      ansible.builtin.apt:
        deb: /tmp/google-chrome-stable_current_amd64.deb

    - name: Install VS Code
      ansible.builtin.shell: |
        wget -qO- https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > packages.microsoft.gpg
        install -o root -g root -m 644 packages.microsoft.gpg /etc/apt/trusted.gpg.d/
        sh -c 'echo "deb [arch=amd64] https://packages.microsoft.com/repos/vscode stable main" > /etc/apt/sources.list.d/vscode.list'
        apt update
        apt install code
      args:
        creates: /usr/bin/code

    - name: Install Docker dependencies and GPG key
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Add Docker GPG key
      ansible.builtin.shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg |  gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
      args:
        creates: /usr/share/keyrings/docker-archive-keyring.gpg

    - name: Get Ubuntu codename
      ansible.builtin.shell: ". /etc/os-release && echo $UBUNTU_CODENAME"
      register: ubuntu_codename
      changed_when: false

    - name: Add Docker APT repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu {{ ubuntu_codename.stdout }} stable"
        state: present
        update_cache: yes

    - name: Install Docker and Docker Compose
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present

    - name: Check if Postman is installed
      ansible.builtin.stat:
        path: /opt/Postman
      register: postman_dir

    - name: Download Postman
      ansible.builtin.get_url:
        url: https://dl.pstmn.io/download/latest/linux_64
        dest: /tmp/postman-linux-x64.tar.gz
      when: not postman_dir.stat.exists

    - name: Extract Postman to /opt
      ansible.builtin.unarchive:
        src: /tmp/postman-linux-x64.tar.gz
        dest: /opt
        remote_src: yes
      when: not postman_dir.stat.exists

    - name: Create Postman symlink
      ansible.builtin.file:
        src: /opt/Postman/Postman
        dest: /usr/local/bin/postman
        state: link

    - name: Create Postman desktop entry
      ansible.builtin.copy:
        dest: /usr/share/applications/postman.desktop
        content: |
          [Desktop Entry]
          Type=Application
          Name=Postman
          Icon=/opt/Postman/app/resources/app/assets/icon.png
          Exec=/opt/Postman/Postman
          Comment=Postman API Client
          Categories=Development;
          Terminal=false

    # --- Node.js via NodeSource ---
    - name: Add NodeSource GPG key and repository
      ansible.builtin.shell: |
        curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
      args:
        creates: /etc/apt/sources.list.d/nodesource.list

    - name: Install Node.js
      ansible.builtin.apt:
        name: nodejs
        state: present

    # --- DBeaver (database GUI) ---
    - name: Download DBeaver Community
      ansible.builtin.get_url:
        url: https://dbeaver.io/files/dbeaver-ce_latest_amd64.deb
        dest: /tmp/dbeaver-ce_latest_amd64.deb

    - name: Install DBeaver
      ansible.builtin.apt:
        deb: /tmp/dbeaver-ce_latest_amd64.deb

    # --- Add current user to docker group ---
    - name: Add user to docker group
      ansible.builtin.user:
        name: "{{ ansible_env.SUDO_USER | default(ansible_user_id) }}"
        groups: docker
        append: yes
